<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BilL Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 400px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #00c9a7;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00a78e;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
    }

    .result p {
      margin: 5px 0;
      font-size: 15px;
    }

    .total {
      font-size: 20px;
      font-weight: bold;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🧾 Bill Calculator</h2>

  <div class="input-group">
    <label>Product Price (₹)</label>
    <input type="number" id="price" placeholder="Enter price">
  </div>

  <div class="input-group">
    <label>Quantity</label>
    <input type="number" id="quantity" placeholder="Enter quantity">
  </div>

  <div class="input-group">
    <label>Tax (%)</label>
    <input type="number" id="tax" placeholder="Enter tax %">
  </div>

  <div class="input-group">
    <label>Discount (%)</label>
    <input type="number" id="discount" placeholder="Enter discount %">
  </div>

  <button onclick="calculateBill()">Calculate</button>

  <div class="result" id="result" style="display:none;">
    <p>Subtotal: ₹<span id="subtotal"></span></p>
    <p>Tax Amount: ₹<span id="taxAmount"></span></p>
    <p>Discount: ₹<span id="discountAmount"></span></p>
    <p class="total">Total: ₹<span id="total"></span></p>
  </div>
</div>

<script>
function calculateBill() {
  let price = parseFloat(document.getElementById("price").value) || 0;
  let quantity = parseFloat(document.getElementById("quantity").value) || 0;
  let tax = parseFloat(document.getElementById("tax").value) || 0;
  let discount = parseFloat(document.getElementById("discount").value) || 0;

  let subtotal = price * quantity;
  let taxAmount = (subtotal * tax) / 100;
  let discountAmount = (subtotal * discount) / 100;

  let total = subtotal + taxAmount - discountAmount;

  document.getElementById("subtotal").innerText = subtotal.toFixed(2);
  document.getElementById("taxAmount").innerText = taxAmount.toFixed(2);
  document.getElementById("discountAmount").innerText = discountAmount.toFixed(2);
  document.getElementById("total").innerText = total.toFixed(2);

  document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
